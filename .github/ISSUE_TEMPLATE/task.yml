name: Task
description: Zgłoś zadanie techniczne, dokumentacyjne albo operacyjne.
title: "[Task]: "
labels: []
body:
  - type: textarea
    id: context
    attributes:
      label: Kontekst
      description: Dlaczego to zadanie jest potrzebne?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Zakres prac
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Warunek ukończenia
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Weryfikacja
      description: Jak sprawdzić wykonanie zadania?
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Ryzyka lub zależności
    validations:
      required: false
  - type: checkboxes
    id: completeness
    attributes:
      label: Kontrola kompletności
      options:
        - label: Zakres prac jest rozbity na konkretne punkty.
          required: true
        - label: Warunek ukończenia jest jednoznaczny.
          required: true
        - label: Sposób weryfikacji jest opisany.
          required: true
